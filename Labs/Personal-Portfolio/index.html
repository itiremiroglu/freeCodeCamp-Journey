<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio Webpage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav id="navbar">
        <ul>
            <li><a href="#welcome-section">About</a></li>
            <li><a href="#project-section">Work</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="welcome-section">
        <h1>Hey I am Mimic</h1>
        <p>a web developer</p>
    </section>
    <section id="project-section">
        <h2 class="project-header">There are some of my projects</h2>
        <div class="projects-grid">
            <a href="https://codepen.io/freeCodeCamp/full/zNqgVx" target="_blank" class="project project-tile">
                <img src="https://cdn.freecodecamp.org/testable-projects-fcc/images/tribute.jpg" alt="project"
                    class="project-image">
                <p class="project-title">Tribute Page</p>
            </a>
            <a href="https://codepen.io/freeCodeCamp/full/qRwwNX" class="project project-tile">
                <img src="https://cdn.freecodecamp.org/testable-projects-fcc/images/random-quote-machine.png"
                    alt="project" class="project-image">
                <p class="project-title">Random Quote Machine</p>
            </a>
            <a href="https://codepen.io/freeCodeCamp/full/wgGVVX" class="project project-tile" target="_blank">
                <img src="https://cdn.freecodecamp.org/testable-projects-fcc/images/calc.png" alt="project"
                    class="project-image">
                <p class="project-title">JavaScript Calculator</p>
            </a>
            <a href="https://codepen.io/freeCodeCamp/full/mVEJag" class="project project-tile" target="_blank">
                <img src="https://cdn.freecodecamp.org/testable-projects-fcc/images/map.jpg" alt="project"
                    class="project-image">
                <p class="project-title">Map Data Across the Globe</p>
            </a>
        </div>
        <a href="https://codepen.io/freeCodeCamp/" class="btn btn-show-all" target="_blank">Show All ></a>
    </section>
    <section id="contact">
        <h2>Let's work together</h2>
        <p>How do you take your coffee?</p>
        <div class="contact-links">
            <a href="https://github.com/freecodecamp" id="profile-link" class="contact-details"
                target="_blank">GitHub</a>
        </div>
    </section>
</body>

</html>
